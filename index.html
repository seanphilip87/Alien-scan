<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Detector: Special Agent Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none; -webkit-user-select: none;
            color: #0f0;
        }

        /* --- CRT & VIGNETTE EFFECTS --- */
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 6;
        }
        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            pointer-events: none; z-index: 7;
        }

        #video-container { position: relative; width: 100vw; height: 100vh; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0); transition: background-color 0.1s ease;
            pointer-events: none; z-index: 5;
        }

        /* --- HUD --- */
        #hud-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2; box-sizing: border-box;
            border: 2px solid rgba(0, 255, 0, 0.3); box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.2);
        }
        #radar-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(to bottom, rgba(0,255,0,0), rgba(0,255,0,0.8), rgba(0,255,0,0));
            box-shadow: 0 0 15px #0f0; opacity: 0;
        }
        @keyframes scanMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        #reticle {
            position: absolute; top: 50%; left: 50%; width: 140px; height: 140px;
            transform: translate(-50%, -50%); border: 2px dashed rgba(0, 255, 0, 0.6);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }
        #reticle::before {
            content: ''; position: absolute; width: 12px; height: 12px;
            background-color: rgba(0, 255, 0, 0.8); border-radius: 50%; box-shadow: 0 0 10px #0f0;
        }
        #reticle-outer {
            position: absolute; top: 50%; left: 50%; width: 180px; height: 180px;
            transform: translate(-50%, -50%); border-left: 4px solid #0f0; border-right: 4px solid #0f0;
            border-top: 4px solid transparent; border-bottom: 4px solid transparent;
            border-radius: 50%; animation: spin 6s linear infinite;
        }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- UI CONTROLS --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 40px 20px; box-sizing: border-box; z-index: 10; pointer-events: none;
        }
        
        .top-bar { display: flex; justify-content: space-between; width: 100%; pointer-events: auto; }
        
        #score-display {
            background: rgba(0, 20, 0, 0.8); border: 1px solid #0f0; padding: 10px;
            border-radius: 5px; font-weight: bold; text-shadow: 0 0 5px #0f0;
        }
        
        #gallery-btn {
            background: rgba(0, 255, 0, 0.2); border: 1px solid #0f0; color: #0f0;
            padding: 10px; border-radius: 5px; font-family: inherit; font-weight: bold;
            cursor: pointer; text-shadow: 0 0 5px #0f0;
        }

        #status-text {
            color: #0f0; text-shadow: 0 0 5px #000, 0 0 10px #0f0; font-size: 1.4rem;
            font-weight: bold; text-align: center; background: rgba(0, 10, 0, 0.75);
            padding: 12px 25px; border-radius: 8px; border: 1px solid #0f0;
        }

        .alien-active {
            color: #f00 !important; text-shadow: 0 0 5px #000, 0 0 15px #f00 !important;
            border-color: #f00 !important; background: rgba(20, 0, 0, 0.85) !important;
        }

        #scan-btn {
            pointer-events: auto; background-color: rgba(0, 255, 0, 0.15); border: 2px solid #0f0;
            color: #0f0; font-family: inherit; font-size: 1.3rem; font-weight: bold;
            padding: 18px 45px; border-radius: 40px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }
        #scan-btn:active { background-color: #0f0; color: #000; }
        #scan-btn:disabled { border-color: #555 !important; color: #555; background-color: rgba(50, 50, 50, 0.2); }

        /* --- SCREENS (Briefing, Proof, Gallery) --- */
        .modal-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            padding: 20px; box-sizing: border-box;
        }

        /* Briefing Specific */
        #briefing-screen { display: flex; justify-content: flex-start; padding-top: 15vh; }
        #briefing-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 30px; text-shadow: 0 0 4px #0f0; min-height: 250px;}
        #accept-btn {
            background-color: #0f0; color: #000; border: none; font-family: inherit;
            font-size: 1.3rem; font-weight: bold; padding: 15px 30px; border-radius: 5px;
            cursor: pointer; box-shadow: 0 0 15px #0f0; display: none;
        }

        /* Proof Specific */
        #proof-screen { display: none; }
        #proof-image { width: 100%; max-height: 70%; object-fit: contain; border: 4px solid #f00; margin-bottom: 20px; }
        .red-btn {
            background-color: rgba(255, 0, 0, 0.2); border: 2px solid #f00; color: #f00;
            font-family: inherit; font-size: 1.1rem; font-weight: bold; padding: 15px 25px;
            border-radius: 30px; cursor: pointer; box-shadow: 0 0 15px rgba(255,0,0,0.3);
        }

        /* Gallery Specific */
        #gallery-screen { display: none; justify-content: flex-start; padding-top: 40px; }
        #gallery-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%;
            overflow-y: auto; max-height: 75vh; margin-bottom: 20px; padding: 10px;
        }
        .gallery-item { width: 100%; border: 2px solid #0f0; border-radius: 5px; }
        .green-btn {
            background-color: rgba(0, 255, 0, 0.2); border: 2px solid #0f0; color: #0f0;
            font-family: inherit; font-size: 1.1rem; font-weight: bold; padding: 15px 25px; border-radius: 30px;
        }

    </style>
</head>
<body>

<div id="briefing-screen" class="modal-screen">
    <div class="scanlines"></div>
    <div id="briefing-text"></div>
    <button id="accept-btn">ACCEPT MISSION</button>
</div>

<div id="video-container">
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <video id="camera" autoplay playsinline></video>
    <div id="hud-layer"><div id="radar-line"></div><div id="reticle-outer"></div><div id="reticle"></div></div>
    <div id="overlay"></div>
    <div id="ui-layer">
        <div class="top-bar">
            <div id="score-display">ALIENS: 0</div>
            <button id="gallery-btn">INTEL DB</button>
        </div>
        <div id="status-text">SYSTEM ONLINE</div>
        <button id="scan-btn">SCAN TARGET</button>
    </div>
</div>

<div id="proof-screen" class="modal-screen">
    <div class="scanlines"></div>
    <div style="color:#f00; font-size: 1.5rem; font-weight:bold; margin-bottom:10px;">INFILTRATOR CAUGHT</div>
    <img id="proof-image" src="" alt="Proof Photo">
    <button id="dismiss-btn" class="red-btn">SAVE TO DATABASE & RESUME</button>
</div>

<div id="gallery-screen" class="modal-screen">
    <div class="scanlines"></div>
    <h2 style="margin-top:0;">CLASSIFIED DATABASE</h2>
    <div id="gallery-grid"></div>
    <button id="close-gallery-btn" class="green-btn">RETURN TO SCANNER</button>
</div>

<canvas id="canvas-processor" style="display:none;"></canvas>

<script>
    const video = document.getElementById('camera');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');
    const scanBtn = document.getElementById('scan-btn');
    const radarLine = document.getElementById('radar-line');
    
    // Screens & Buttons
    const briefingScreen = document.getElementById('briefing-screen');
    const briefingText = document.getElementById('briefing-text');
    const acceptBtn = document.getElementById('accept-btn');
    const videoContainer = document.getElementById('video-container');
    const proofScreen = document.getElementById('proof-screen');
    const proofImage = document.getElementById('proof-image');
    const dismissBtn = document.getElementById('dismiss-btn');
    const galleryScreen = document.getElementById('gallery-screen');
    const galleryBtn = document.getElementById('gallery-btn');
    const closeGalleryBtn = document.getElementById('close-gallery-btn');
    const galleryGrid = document.getElementById('gallery-grid');
    const scoreDisplay = document.getElementById('score-display');
    
    const canvas = document.getElementById('canvas-processor');
    const ctx = canvas.getContext('2d');

    // Data
    const data_species = ["Gigglotentacloid", "Nebula Snail", "Purple Gloop-Dropper", "Standard Gray", "Fuzzy-Wuzzy Sock Snatcher", "Laser-Eyed Noodle", "Tentacled Tootsie-Pop"];
    const data_planets = ["Planet Broccoli", "The Big Cheese Cluster", "Noodle Nebula Sector 4", "Broccoli Beta-9", "Sector X", "The Void of Homework", "The Glitter Galaxy"];
    const data_threats = ["MAXIMUM (Will not share dessert)", "VERY LOW (Will just hug you)", "HIGH (Dislikes loud noises)", "UNKNOWN (Approach with glitter)", "MEDIUM (Steals TV batteries)", "VARIABLE (Depends if they had a nap)"];
    const data_habits = ["Mimicking bird calls badly", "Counting bubbles in drinks", "Stealing only left shoes", "Leaving slime trails on carpet", "Hiding TV remotes", "Eating crayons (only red ones)"];

    let audioCtx;
    let forceAlien = false;
    let holdTimer;
    let intelDatabase = [];

    if (localStorage.getItem('alienIntel')) {
        intelDatabase = JSON.parse(localStorage.getItem('alienIntel'));
        updateScore();
    }

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'alien') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'camera') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(2000, audioCtx.currentTime); osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'beep') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        }
    }

    function vibrate(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }

    // --- MISSION BRIEFING TYPEWRITER ---
    const missionText = "CLASSIFIED BRIEFING...\n\nAGENT: Earth has been infiltrated.\n\nAliens are walking among us, disguised as normal humans. Your mission is to use this Biometric Scanner to expose them and build an Intel Database of the threats.\n\nAim the reticle at a subject's face and initiate scan.\n\nGood luck.";
    let typeIndex = 0;
    
    function typeWriter() {
        if (typeIndex < missionText.length) {
            briefingText.innerHTML += missionText.charAt(typeIndex) === '\n' ? '<br>' : missionText.charAt(typeIndex);
            typeIndex++;
            if(typeIndex % 3 === 0) playSound('beep'); 
            setTimeout(typeWriter, 40);
        } else {
            acceptBtn.style.display = 'block';
        }
    }

    acceptBtn.addEventListener('click', () => {
        initAudio();
        briefingScreen.style.display = 'none';
        videoContainer.style.display = 'block';
        setupCamera();
    });

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
            video.srcObject = stream;
        } catch (err) {
            statusText.innerText = "CAMERA ERROR"; statusText.classList.add('alien-active');
        }
    }

    function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        for(let n = 0; n < words.length; n++) {
            const testLine = line + words[n] + ' ';
            const metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                context.strokeText(line, x, y); context.fillText(line, x, y);
                line = words[n] + ' ';
                y += lineHeight;
            } else {
                line = testLine;
            }
        }
        context.strokeText(line, x, y); context.fillText(line, x, y);
        return y + lineHeight; 
    }

    function generateEvidenceReport() {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const w = canvas.width; const h = canvas.height;
        const margin = Math.floor(w * 0.05);
        const lineHeight = Math.floor(h * 0.04); 
        
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; ctx.strokeStyle = "black";
        ctx.lineWidth = Math.floor(w * 0.005); ctx.font = `bold ${Math.floor(h * 0.035)}px Courier New`; 
        ctx.textBaseline = "top";

        const maxTextWidth = w - (margin * 2);
        ctx.fillStyle = "rgba(0,0,0,0.6)"; 
        ctx.fillRect(margin - 10, h * 0.55, w - (margin * 2) + 20, h * 0.45);

        let currentY = h * 0.58;

        const printLine = (label, value, color="#fff") => {
            ctx.fillStyle = "#ff0"; 
            ctx.strokeText(`${label}:`, margin, currentY); ctx.fillText(`${label}:`, margin, currentY);
            
            const labelWidth = ctx.measureText(`${label}: `).width;
            ctx.fillStyle = color; 
            currentY = wrapText(ctx, value, margin + labelWidth, currentY, maxTextWidth - labelWidth, lineHeight);
            currentY += (lineHeight * 0.5); 
        };

        ctx.fillStyle = "#f00"; ctx.font = `bold ${Math.floor(h * 0.05)}px Courier New`;
        ctx.fillText(`ALIEN CONFIRMED`, margin, margin * 2);

        ctx.font = `bold ${Math.floor(h * 0.035)}px Courier New`;
        printLine("SPECIES", pickRandom(data_species));
        printLine("ORIGIN", pickRandom(data_planets));
        
        let threat = pickRandom(data_threats);
        printLine("THREAT", threat, threat.includes("MAXIMUM") ? "#f00" : "#fff");
        printLine("HABIT", pickRandom(data_habits));

        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        proofImage.src = dataUrl;
        proofScreen.style.display = 'flex';
        
        proofImage.dataset.tempImageData = dataUrl; 
    }

    function startHoldTimer() {
        holdTimer = setTimeout(() => { forceAlien = true; scanBtn.style.borderColor = "#f00"; setTimeout(() => { scanBtn.style.borderColor = "#0f0"; }, 300); vibrate(50); }, 2000);
    }
    function cancelHoldTimer() { clearTimeout(holdTimer); }

    scanBtn.addEventListener('mousedown', startHoldTimer); scanBtn.addEventListener('touchstart', startHoldTimer, {passive: true});
    scanBtn.addEventListener('mouseup', cancelHoldTimer); scanBtn.addEventListener('mouseleave', cancelHoldTimer); scanBtn.addEventListener('touchend', cancelHoldTimer);

    scanBtn.addEventListener('click', () => {
        initAudio(); scanBtn.disabled = true; statusText.innerText = "SCANNING..."; statusText.classList.remove('alien-active');
        radarLine.style.opacity = "1"; radarLine.style.animation = "scanMove 1.5s ease-in-out infinite";
        
        let blipCount = 0;
        let scanInterval = setInterval(() => { playSound('beep'); vibrate(20); blipCount++; if(blipCount >= 6) clearInterval(scanInterval); }, 300);

        setTimeout(() => {
            radarLine.style.opacity = "0"; radarLine.style.animation = "none";
            const isAlien = forceAlien || (Math.random() < 0.15); forceAlien = false; 

            if (isAlien) {
                statusText.innerText = "⚠️ ALIEN DETECTED ⚠️"; statusText.classList.add('alien-active');
                vibrate([200, 100, 200, 100, 400]); 
                
                let strobe = setInterval(() => { overlay.style.backgroundColor = overlay.style.backgroundColor === "rgba(255, 0, 0, 0.7)" ? "rgba(0, 0, 0, 0)" : "rgba(255, 0, 0, 0.7)"; }, 100);
                setTimeout(() => clearInterval(strobe), 1500);

                let sirenCount = 0; playSound('alien');
                let sirenInterval = setInterval(() => { playSound('alien'); sirenCount++; if(sirenCount >= 2) clearInterval(sirenInterval); }, 400);

                setTimeout(() => { playSound('camera'); generateEvidenceReport(); }, 1700);
            } else {
                statusText.innerText = "SUBJECT: 100% HUMAN"; overlay.style.backgroundColor = "rgba(0, 255, 0, 0.25)"; vibrate([100, 50, 100]);
                setTimeout(() => { statusText.innerText = "SYSTEM ONLINE"; overlay.style.backgroundColor = "rgba(0, 0, 0, 0)"; scanBtn.disabled = false; }, 2500);
            }
        }, 2200); 
    });

    function updateScore() {
        scoreDisplay.innerText = `ALIENS: ${intelDatabase.length}`;
    }

    dismissBtn.addEventListener('click', () => {
        intelDatabase.unshift(proofImage.dataset.tempImageData); 
        localStorage.setItem('alienIntel', JSON.stringify(intelDatabase));
        updateScore();
        
        proofScreen.style.display = 'none';
        statusText.innerText = "SYSTEM ONLINE"; statusText.classList.remove('alien-active');
        overlay.style.backgroundColor = "rgba(0, 0, 0, 0)"; scanBtn.disabled = false;
    });

    galleryBtn.addEventListener('click', () => {
        galleryGrid.innerHTML = ''; 
        if(intelDatabase.length === 0) {
            galleryGrid.innerHTML = '<p>No aliens detected yet.</p>';
        } else {
            intelDatabase.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc; img.className = 'gallery-item';
                galleryGrid.appendChild(img);
            });
        }
        galleryScreen.style.display = 'flex';
    });

    closeGalleryBtn.addEventListener('click', () => { galleryScreen.style.display = 'none'; });

    window.addEventListener('load', () => { initAudio(); typeWriter(); });

    // --- PWA SERVICE WORKER REGISTRATION ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered!', reg))
                .catch(err => console.error('Service Worker Failed!', err));
        });
    }
</script>
</body>
</html>
