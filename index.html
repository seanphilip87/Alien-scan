<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Detector Pro + Proof Maker</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            transition: background-color 0.1s ease;
            pointer-events: none;
            z-index: 5;
        }

        /* --- Sci-Fi HUD Elements --- */
        #hud-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            box-sizing: border-box;
            border: 2px solid rgba(0, 255, 0, 0.3);
            box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.2);
        }

        /* Animated Radar Laser Line */
        #radar-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to bottom, rgba(0,255,0,0), rgba(0,255,0,0.8), rgba(0,255,0,0));
            box-shadow: 0 0 15px #0f0;
            opacity: 0;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* Target Reticle in the Center */
        #reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(0, 255, 0, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        #reticle::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: rgba(0, 255, 0, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px #0f0;
        }

        #reticle-outer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            transform: translate(-50%, -50%);
            border-left: 4px solid #0f0;
            border-right: 4px solid #0f0;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-radius: 50%;
            animation: spin 6s linear infinite;
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* --- UI Controls --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }

        #status-text {
            color: #0f0;
            text-shadow: 0 0 5px #000, 0 0 10px #0f0;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            background: rgba(0, 10, 0, 0.75);
            padding: 12px 25px;
            border-radius: 8px;
            border: 1px solid #0f0;
            letter-spacing: 2px;
        }

        .alien-active {
            color: #f00 !important;
            text-shadow: 0 0 5px #000, 0 0 15px #f00 !important;
            border-color: #f00 !important;
            background: rgba(20, 0, 0, 0.85) !important;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        #scan-btn {
            pointer-events: auto;
            background-color: rgba(0, 255, 0, 0.15);
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 18px 45px;
            border-radius: 40px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            letter-spacing: 1px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #scan-btn:active {
            background-color: #0f0;
            color: #000;
            box-shadow: 0 0 25px #0f0;
        }

        #scan-btn:disabled {
            border-color: #555;
            color: #555;
            box-shadow: none;
            background-color: rgba(50, 50, 50, 0.2);
        }

        /* --- PROOF SCREEN (MODAL) --- */
        #proof-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: none; /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100; /* On top of everything */
            padding: 20px;
            box-sizing: border-box;
        }

        #proof-image {
            width: 100%;
            max-height: 70%;
            object-fit: contain; /* Shows the full photo */
            border: 4px solid #f00;
            box-shadow: 0 0 30px #f00;
            margin-bottom: 30px;
        }

        #proof-header {
            color: #f00;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #f00;
        }

        #dismiss-btn {
            background-color: #f00;
            color: #000;
            border: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="camera" autoplay playsinline></video>
    
    <div id="hud-layer">
        <div id="radar-line"></div>
        <div id="reticle-outer"></div>
        <div id="reticle"></div>
    </div>
    
    <div id="overlay"></div>
    
    <div id="ui-layer">
        <div id="status-text">SYSTEM ONLINE</div>
        <button id="scan-btn">SCAN TARGET</button>
    </div>
</div>

<div id="proof-screen">
    <div id="proof-header">PROOF OF INFILTRATION</div>
    <img id="proof-image" src="" alt="Proof Photo">
    <button id="dismiss-btn">OK</button>
</div>

<canvas id="canvas-processor" style="display:none;"></canvas>

<script>
    const video = document.getElementById('camera');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');
    const scanBtn = document.getElementById('scan-btn');
    const radarLine = document.getElementById('radar-line');
    const reticle = document.getElementById('reticle');
    const reticleOuter = document.getElementById('reticle-outer');
    
    // Proof elements
    const proofScreen = document.getElementById('proof-screen');
    const proofImage = document.getElementById('proof-image');
    const dismissBtn = document.getElementById('dismiss-btn');
    const canvas = document.getElementById('canvas-processor');
    const ctx = canvas.getContext('2d');

    let audioCtx;
    let scanInterval;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'alien') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.25);
            osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.5);
            gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        } else if (type === 'camera') {
            // Camera Shutter Snap
            osc.type = 'noise';
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            // Recreating noise is complex, using a short burst sawtooth for simpler execution
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(2000, audioCtx.currentTime);
            osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
        // ... (removed other basic sounds for brevity) ...
    }

    async function setupCamera() {
        try {
            // Need video capabilities for drawing
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
                audio: false
            });
            video.srcObject = stream;
        } catch (err) {
            console.error(err);
            statusText.innerText = "CAMERA ERROR";
            statusText.classList.add('alien-active');
        }
    }

    function generateProofPhoto() {
        // 1. Set canvas size to match video resolution
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // 2. Capture the current frame
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // 3. Draw alien proof elements
        const viewWidth = canvas.width;
        const viewHeight = canvas.height;
        const centerX = viewWidth / 2;
        const centerY = viewHeight / 2;

        // --- Alien Green Tint Overlay ---
        ctx.fillStyle = "rgba(0, 255, 0, 0.15)";
        ctx.fillRect(0, 0, viewWidth, viewHeight);

        // --- DRAW BIG ALIEN EYES (Manual drawing on canvas) ---
        // Eye parameters based on the image size
        const eyeWidth = viewWidth * 0.15;
        const eyeHeight = eyeWidth * 1.5; // Tall slanted eyes
        const eyeOffsetX = viewWidth * 0.1; // Distance from center
        const eyeOffsetY = -viewHeight * 0.05; // Slightly above center reticle

        // Left Eye (black slanted oval)
        ctx.save();
        ctx.fillStyle = "#000";
        ctx.translate(centerX - eyeOffsetX, centerY + eyeOffsetY);
        ctx.rotate(-Math.PI / 8); // Slant in
        ctx.beginPath();
        ctx.ellipse(0, 0, eyeWidth/2, eyeHeight/2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Right Eye
        ctx.save();
        ctx.fillStyle = "#000";
        ctx.translate(centerX + eyeOffsetX, centerY + eyeOffsetY);
        ctx.rotate(Math.PI / 8); // Slant in
        ctx.beginPath();
        ctx.ellipse(0, 0, eyeWidth/2, eyeHeight/2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // --- Text Proof Stamp ---
        ctx.fillStyle = "#f00";
        ctx.font = `bold ${Math.floor(viewHeight * 0.04)}px Courier New`;
        ctx.fillText(`ALIEN DETECTED`, 30, viewHeight - 50);
        ctx.fillText(`CONFIRMED BIOMETRICS`, 30, viewHeight - 20);

        // 4. Convert canvas to Image source and show proof screen
        proofImage.src = canvas.toDataURL('image/png');
        proofScreen.style.display = 'flex';
    }

    scanBtn.addEventListener('click', () => {
        initAudio();
        
        scanBtn.disabled = true;
        statusText.innerText = "SCANNING BIOMETRICS...";
        statusText.classList.remove('alien-active');
        
        radarLine.style.opacity = "1";
        radarLine.style.animation = "scanMove 1.5s ease-in-out infinite";
        
        // Removed intermediate beep noises to focus on implementation
        setTimeout(() => {
            radarLine.style.opacity = "0";
            radarLine.style.animation = "none";

            // 15% chance of detecting an Alien
            const isAlien = Math.random() < 0.15; 

            if (isAlien) {
                statusText.innerText = "⚠️ ALIEN DETECTED ⚠️";
                statusText.classList.add('alien-active');
                
                // Red alert flash
                let strobe = setInterval(() => {
                    overlay.style.backgroundColor = overlay.style.backgroundColor === "rgba(255, 0, 0, 0.5)" ? "rgba(0, 0, 0, 0)" : "rgba(255, 0, 0, 0.5)";
                }, 150);
                setTimeout(() => clearInterval(strobe), 1200);

                // Siren Loop
                let sirenCount = 0;
                playSound('alien');
                let sirenInterval = setInterval(() => {
                    playSound('alien');
                    sirenCount++;
                    if(sirenCount >= 2) clearInterval(sirenInterval);
                }, 400);

                // --- NEW PROOF LOGIC ---
                setTimeout(() => {
                    // Play camera sound and take photo
                    playSound('camera');
                    generateProofPhoto();
                }, 1500); // Take photo after some red flashing

            } else {
                statusText.innerText = "SUBJECT: HUMAN";
                overlay.style.backgroundColor = "rgba(0, 255, 0, 0.25)";
                
                // Simple happy chime sound logic removed for brevity

                // Reset back to original state
                setTimeout(() => {
                    statusText.innerText = "SYSTEM ONLINE";
                    overlay.style.backgroundColor = "rgba(0, 0, 0, 0)";
                    scanBtn.disabled = false;
                }, 2500);
            }

        }, 2200); // Scan length
    });

    dismissBtn.addEventListener('click', () => {
        // Close proof screen
        proofScreen.style.display = 'none';
        // Reset main screen
        statusText.innerText = "SYSTEM ONLINE";
        statusText.classList.remove('alien-active');
        overlay.style.backgroundColor = "rgba(0, 0, 0, 0)";
        scanBtn.disabled = false;
    });

    window.addEventListener('load', setupCamera);
</script>
</body>
</html>
