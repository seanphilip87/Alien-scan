<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Detector Pro: Evidence Collector</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            transition: background-color 0.1s ease;
            pointer-events: none;
            z-index: 5;
        }

        /* --- Sci-Fi HUD Elements --- */
        #hud-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            box-sizing: border-box;
            border: 2px solid rgba(0, 255, 0, 0.3);
            box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.2);
        }

        #radar-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to bottom, rgba(0,255,0,0), rgba(0,255,0,0.8), rgba(0,255,0,0));
            box-shadow: 0 0 15px #0f0;
            opacity: 0;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        #reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(0, 255, 0, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        #reticle::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: rgba(0, 255, 0, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px #0f0;
        }

        #reticle-outer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            transform: translate(-50%, -50%);
            border-left: 4px solid #0f0;
            border-right: 4px solid #0f0;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-radius: 50%;
            animation: spin 6s linear infinite;
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* --- UI Controls --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }

        #status-text {
            color: #0f0;
            text-shadow: 0 0 5px #000, 0 0 10px #0f0;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            background: rgba(0, 10, 0, 0.75);
            padding: 12px 25px;
            border-radius: 8px;
            border: 1px solid #0f0;
            letter-spacing: 2px;
        }

        .alien-active {
            color: #f00 !important;
            text-shadow: 0 0 5px #000, 0 0 15px #f00 !important;
            border-color: #f00 !important;
            background: rgba(20, 0, 0, 0.85) !important;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        #scan-btn {
            pointer-events: auto;
            background-color: rgba(0, 255, 0, 0.15);
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 18px 45px;
            border-radius: 40px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            letter-spacing: 1px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: border-color 0.2s ease;
        }

        #scan-btn:active {
            background-color: #0f0;
            color: #000;
            box-shadow: 0 0 25px #0f0;
        }

        #scan-btn:disabled {
            border-color: #555 !important;
            color: #555;
            box-shadow: none;
            background-color: rgba(50, 50, 50, 0.2);
        }

        /* --- EVIDENCE REPORT SCREEN --- */
        #proof-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        #proof-image {
            width: 100%;
            max-height: 75%;
            object-fit: contain;
            border: 4px solid #f00;
            box-shadow: 0 0 30px #f00;
            margin-bottom: 25px;
        }

        #proof-header {
            color: #f00;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #f00;
            text-align: center;
            width: 100%;
        }

        #dismiss-btn {
            background-color: rgba(255, 0, 0, 0.2);
            border: 2px solid #f00;
            color: #f00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 35px;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        
        #dismiss-btn:active {
            background-color: #f00;
            color: #000;
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="camera" autoplay playsinline></video>
    
    <div id="hud-layer">
        <div id="radar-line"></div>
        <div id="reticle-outer"></div>
        <div id="reticle"></div>
    </div>
    
    <div id="overlay"></div>
    
    <div id="ui-layer">
        <div id="status-text">SYSTEM ONLINE</div>
        <button id="scan-btn">SCAN TARGET</button>
    </div>
</div>

<div id="proof-screen">
    <div id="proof-header">🚨 INFILTRATOR BIOMETRIC PROFILE 🚨</div>
    <img id="proof-image" src="" alt="Proof Photo">
    <button id="dismiss-btn">ACKNOWLEDGE & RESUME WATCH</button>
</div>

<canvas id="canvas-processor" style="display:none;"></canvas>

<script>
    const video = document.getElementById('camera');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');
    const scanBtn = document.getElementById('scan-btn');
    const radarLine = document.getElementById('radar-line');
    
    const proofScreen = document.getElementById('proof-screen');
    const proofImage = document.getElementById('proof-image');
    const dismissBtn = document.getElementById('dismiss-btn');
    const canvas = document.getElementById('canvas-processor');
    const ctx = canvas.getContext('2d');

    // Humorous Data
    const data_species = ["Gigglotentacloid", "Nebula Snail", "Purple Gloop-Dropper", "Standard Gray (Boring)", "Fuzzy-Wuzzy Sock Snatcher", "Laser-Eyed Noodle", "Tentacled Tootsie-Pop"];
    const data_planets = ["Planet Broccoli (Bad Luck)", "The Big Cheese Cluster", "Noodle Nebula Sector 4", "Broccoli Beta-9", "Sector X (Behind the Couch)", "The Void of Homework", "The Glitter Galaxy"];
    const data_threats = ["MAXIMUM (Will not share dessert)", "VERY LOW (Will just hug you)", "HIGH (Dislikes loud noises and broccoli)", "UNKNOWN (Approach with glitter)", "MEDIUM (Steals TV remote batteries)", "VARIABLE (Depends if they had a nap)"];
    const data_habits = ["Mimicking bird calls badly", "Counting bubbles in drinks", "Stealing only left shoes", "Leaving slime trails on carpet", "Hiding TV remotes", "Organizing bookshelves by smell", "Eating crayons (only red ones)"];

    let audioCtx;
    let scanInterval;
    
    // --- SECRET CHEAT VARIABLES ---
    let holdTimer;
    let forceAlien = false;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'alien') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.7, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'camera') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(2000, audioCtx.currentTime);
            osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'human') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'beep') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }
    }

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
                audio: false
            });
            video.srcObject = stream;
        } catch (err) {
            console.error(err);
            statusText.innerText = "CAMERA ERROR";
            statusText.classList.add('alien-active');
        }
    }

    function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateEvidenceReport() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const w = canvas.width;
        const h = canvas.height;
        const margin = Math.floor(w * 0.05);
        let yPos = Math.floor(h * 0.65); 
        const lineHeight = Math.floor(h * 0.05); 

        const species = pickRandom(data_species);
        const origin = pickRandom(data_planets);
        const threat = pickRandom(data_threats);
        const habit = pickRandom(data_habits);

        ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; 
        ctx.strokeStyle = "black";
        ctx.lineWidth = Math.floor(w * 0.005); 
        ctx.font = `bold ${Math.floor(h * 0.035)}px Courier New`; 
        ctx.textAlign = "left";

        const printLine = (label, value, color="#fff") => {
            ctx.fillStyle = "rgba(0,0,0,0.5)"; 
            ctx.fillRect(margin - 10, yPos - (lineHeight * 0.8), w - (margin * 2) + 20, lineHeight + 5);

            ctx.fillStyle = "#ff0"; 
            ctx.strokeText(`${label}:`, margin, yPos);
            ctx.fillText(`${label}:`, margin, yPos);

            ctx.fillStyle = color; 
            ctx.strokeText(value, margin + (ctx.measureText(`${label}: `).width), yPos);
            ctx.fillText(value, margin + (ctx.measureText(`${label}: `).width), yPos);
            yPos += lineHeight;
        };

        ctx.fillStyle = "#f00";
        ctx.font = `bold ${Math.floor(h * 0.05)}px Courier New`;
        ctx.fillText(`ALIEN CONFIRMED`, margin, margin * 2);

        yPos = h - (lineHeight * 5); 
        printLine("SPECIES", species);
        printLine("ORIGIN", origin);
        printLine("THREAT", threat, threat.includes("MAXIMUM") ? "#f00" : threat.includes("LOW") ? "#0f0" : "#fff");
        printLine("HABIT", habit);

        proofImage.src = canvas.toDataURL('image/png');
        proofScreen.style.display = 'flex';
    }

    // --- SECRET CHEAT EVENT LISTENERS ---
    function startHoldTimer(e) {
        // Start the 2-second countdown when the button is pressed
        holdTimer = setTimeout(() => {
            forceAlien = true; // Arm the cheat
            
            // Secret visual indicator: blink the button border red quickly
            scanBtn.style.borderColor = "#f00";
            setTimeout(() => {
                scanBtn.style.borderColor = "#0f0";
            }, 300);
            
        }, 2000); // 2000 milliseconds = 2 seconds
    }

    function cancelHoldTimer() {
        // If they let go before 2 seconds, cancel the timer
        clearTimeout(holdTimer);
    }

    // Listen for mouse/touch down to start the timer
    scanBtn.addEventListener('mousedown', startHoldTimer);
    scanBtn.addEventListener('touchstart', startHoldTimer, {passive: true});

    // Listen for letting go or sliding off the button to cancel the timer
    scanBtn.addEventListener('mouseup', cancelHoldTimer);
    scanBtn.addEventListener('mouseleave', cancelHoldTimer);
    scanBtn.addEventListener('touchend', cancelHoldTimer);

    // --- MAIN SCAN LOGIC ---
    scanBtn.addEventListener('click', () => {
        initAudio();
        
        scanBtn.disabled = true;
        statusText.innerText = "SCANNING BIOMETRICS...";
        statusText.classList.remove('alien-active');
        
        radarLine.style.opacity = "1";
        radarLine.style.animation = "scanMove 1.5s ease-in-out infinite";
        
        let blipCount = 0;
        scanInterval = setInterval(() => {
            playSound('beep');
            blipCount++;
            if(blipCount >= 6) clearInterval(scanInterval);
        }, 300);

        setTimeout(() => {
            clearInterval(scanInterval);
            radarLine.style.opacity = "0";
            radarLine.style.animation = "none";

            // Determine result: 15% chance randomly, OR 100% chance if cheat is armed
            const isAlien = forceAlien || (Math.random() < 0.15); 
            
            // Reset the cheat back to false for the next scan
            forceAlien = false; 

            if (isAlien) {
                statusText.innerText = "⚠️ ALIEN DETECTED ⚠️";
                statusText.classList.add('alien-active');
                
                let strobe = setInterval(() => {
                    overlay.style.backgroundColor = overlay.style.backgroundColor === "rgba(255, 0, 0, 0.7)" ? "rgba(0, 0, 0, 0)" : "rgba(255, 0, 0, 0.7)";
                }, 100);
                setTimeout(() => clearInterval(strobe), 1500);

                let sirenCount = 0;
                playSound('alien');
                let sirenInterval = setInterval(() => {
                    playSound('alien');
                    sirenCount++;
                    if(sirenCount >= 2) clearInterval(sirenInterval);
                }, 400);

                setTimeout(() => {
                    playSound('camera');
                    generateEvidenceReport();
                }, 1700);

            } else {
                statusText.innerText = "SUBJECT: 100% HUMAN";
                overlay.style.backgroundColor = "rgba(0, 255, 0, 0.25)";
                playSound('human');
                
                setTimeout(() => {
                    statusText.innerText = "SYSTEM ONLINE";
                    overlay.style.backgroundColor = "rgba(0, 0, 0, 0)";
                    scanBtn.disabled = false;
                }, 2500);
            }

        }, 2200); 
    });

    dismissBtn.addEventListener('click', () => {
        proofScreen.style.display = 'none';
        statusText.innerText = "SYSTEM ONLINE";
        statusText.classList.remove('alien-active');
        overlay.style.backgroundColor = "rgba(0, 0, 0, 0)";
        scanBtn.disabled = false;
    });

    window.addEventListener('load', setupCamera);
</script>
</body>
</html>
