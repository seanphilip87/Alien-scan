<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Detector: Elite Agent</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; background-color: #000;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            user-select: none; -webkit-user-select: none; color: #0f0;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 6;
        }
        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9); pointer-events: none; z-index: 7;
        }

        #video-container { position: relative; width: 100vw; height: 100vh; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; transition: filter 0.3s ease; }
        
        .filter-night { filter: sepia(100%) hue-rotate(90deg) saturate(300%) contrast(150%); }
        .filter-thermal { filter: invert(1) hue-rotate(180deg) saturate(200%) contrast(120%); }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0); transition: background-color 0.1s ease;
            pointer-events: none; z-index: 5;
        }

        #hud-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2; box-sizing: border-box;
            border: 2px solid rgba(0, 255, 0, 0.3); box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.2);
        }
        #radar-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(to bottom, rgba(0,255,0,0), rgba(0,255,0,0.8), rgba(0,255,0,0));
            box-shadow: 0 0 15px #0f0; opacity: 0;
        }
        @keyframes scanMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        #reticle {
            position: absolute; top: 50%; left: 50%; width: 140px; height: 140px;
            transform: translate(-50%, -50%); border: 2px dashed rgba(0, 255, 0, 0.6);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }
        #reticle::before {
            content: ''; position: absolute; width: 12px; height: 12px;
            background-color: rgba(0, 255, 0, 0.8); border-radius: 50%; box-shadow: 0 0 10px #0f0;
        }
        #reticle-outer {
            position: absolute; top: 50%; left: 50%; width: 180px; height: 180px;
            transform: translate(-50%, -50%); border-left: 4px solid #0f0; border-right: 4px solid #0f0;
            border-top: 4px solid transparent; border-bottom: 4px solid transparent;
            border-radius: 50%; animation: spin 6s linear infinite;
        }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- NEW PROXIMITY RADAR --- */
        #proximity-radar {
            position: absolute; bottom: 20px; left: 20px; width: 70px; height: 70px;
            border: 2px solid rgba(0, 255, 0, 0.6); border-radius: 50%; background: rgba(0, 20, 0, 0.7);
            z-index: 10; pointer-events: none; overflow: hidden; box-shadow: 0 0 10px #0f0;
        }
        #radar-sweep {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(0,255,0,0) 70%, rgba(0,255,0,0.6) 100%);
            animation: radarSpin 2s linear infinite;
        }
        @keyframes radarSpin { 100% { transform: rotate(360deg); } }
        #radar-blip {
            position: absolute; width: 8px; height: 8px; background: #0f0; border-radius: 50%;
            opacity: 0; box-shadow: 0 0 8px #0f0;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 40px 10px; box-sizing: border-box; z-index: 10; pointer-events: none;
        }
        
        .top-bar { display: flex; justify-content: space-between; width: 100%; pointer-events: auto; }
        
        .info-panel {
            background: rgba(0, 20, 0, 0.8); border: 1px solid #0f0; padding: 10px;
            border-radius: 5px; text-shadow: 0 0 5px #0f0; display: flex; flex-direction: column;
            max-width: 50%;
        }
        #agent-name-display { font-weight: bold; font-size: 1rem; color: #fff;}
        #agent-rank-display { font-size: 0.75rem; color: #0f0; margin-top: 4px; text-transform: uppercase;}
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        .btn-small {
            background: rgba(0, 255, 0, 0.2); border: 1px solid #0f0; color: #0f0;
            padding: 8px 12px; border-radius: 5px; font-family: inherit; font-weight: bold;
            cursor: pointer; text-shadow: 0 0 5px #0f0;
        }
        .btn-small-yellow { border-color: #ff0; color: #ff0; background: rgba(255, 255, 0, 0.15); text-shadow: 0 0 5px #ff0; }

        #status-text {
            color: #0f0; text-shadow: 0 0 5px #000, 0 0 10px #0f0; font-size: 1.4rem;
            font-weight: bold; text-align: center; background: rgba(0, 10, 0, 0.75);
            padding: 12px 25px; border-radius: 8px; border: 1px solid #0f0;
        }

        .alien-active {
            color: #f00 !important; text-shadow: 0 0 5px #000, 0 0 15px #f00 !important;
            border-color: #f00 !important; background: rgba(20, 0, 0, 0.85) !important;
        }

        #scan-btn {
            pointer-events: auto; background-color: rgba(0, 255, 0, 0.15); border: 2px solid #0f0;
            color: #0f0; font-family: inherit; font-size: 1.3rem; font-weight: bold;
            padding: 18px 45px; border-radius: 40px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            transition: border-color 0.2s ease;
        }
        #scan-btn:active { background-color: #0f0; color: #000; }
        #scan-btn:disabled { border-color: #555 !important; color: #555; background-color: rgba(50, 50, 50, 0.2); }

        .modal-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            padding: 20px; box-sizing: border-box;
        }

        /* Profile Login Screen */
        #profile-screen { z-index: 101; }
        #profile-screen h1 { color: #0f0; text-shadow: 0 0 10px #0f0; text-align: center; }
        #agent-input {
            background: rgba(0,255,0,0.1); border: 2px solid #0f0; color: #fff;
            font-family: inherit; font-size: 1.5rem; padding: 15px; text-align: center;
            border-radius: 5px; margin-bottom: 20px; outline: none; width: 80%; text-transform: uppercase;
        }
        #agent-input::placeholder { color: rgba(0,255,0,0.5); }
        .green-btn {
            background-color: rgba(0, 255, 0, 0.2); border: 2px solid #0f0; color: #0f0;
            font-family: inherit; font-size: 1.2rem; font-weight: bold; padding: 15px 30px;
            border-radius: 5px; cursor: pointer; box-shadow: 0 0 15px rgba(0,255,0,0.3); margin-bottom: 10px;
        }
        
        #briefing-screen { display: none; justify-content: flex-start; padding-top: 15vh; }
        #briefing-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 30px; text-shadow: 0 0 4px #0f0; min-height: 250px;}
        
        /* Mission Board Screen */
        #mission-board-screen { display: none; text-align: center; }
        #mission-board-screen h2 { color: #ff0; text-shadow: 0 0 10px #ff0; font-size: 2rem; margin-bottom: 10px; }
        .bounty-card {
            border: 2px dashed #ff0; background: rgba(255, 255, 0, 0.1); padding: 20px;
            border-radius: 10px; margin-bottom: 30px; width: 90%;
        }
        .bounty-card h3 { color: #fff; font-size: 1.5rem; margin: 0 0 10px 0; }
        .bounty-card p { color: #ff0; font-size: 1.1rem; margin: 5px 0; }

        #proof-screen { display: none; }
        #proof-image { width: 100%; max-height: 70%; object-fit: contain; border: 4px solid #f00; margin-bottom: 20px; }
        .red-btn {
            background-color: rgba(255, 0, 0, 0.2); border: 2px solid #f00; color: #f00;
            font-family: inherit; font-size: 1.1rem; font-weight: bold; padding: 15px 25px;
            border-radius: 30px; cursor: pointer; box-shadow: 0 0 15px rgba(255,0,0,0.3);
        }

        #gallery-screen { display: none; justify-content: flex-start; padding-top: 40px; }
        #gallery-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%;
            overflow-y: auto; max-height: 70vh; margin-bottom: 20px; padding: 10px;
        }
        .gallery-item { width: 100%; border: 2px solid #0f0; border-radius: 5px; }

    </style>
</head>
<body>

<div id="profile-screen" class="modal-screen">
    <div class="scanlines"></div>
    <h1>HQ IDENTIFICATION</h1>
    <p>ENTER AGENT NAME:</p>
    <input type="text" id="agent-input" placeholder="E.g. FREYA" autocomplete="off">
    <button id="login-btn" class="green-btn">AUTHORIZE</button>
</div>

<div id="briefing-screen" class="modal-screen">
    <div class="scanlines"></div>
    <div id="briefing-text"></div>
    <button id="accept-btn" class="green-btn" style="display:none;">ACCEPT MISSION</button>
</div>

<div id="mission-board-screen" class="modal-screen">
    <div class="scanlines"></div>
    <h2>⚠️ ACTIVE BOUNTY ⚠️</h2>
    <div class="bounty-card">
        <p>TARGET SPECIES:</p>
        <h3 id="bounty-target-name">UNKNOWN</h3>
        <p>REWARD: SPECIAL COMMENDATION</p>
    </div>
    <button id="close-mission-btn" class="green-btn">RETURN TO SCANNER</button>
</div>

<div id="video-container">
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <video id="camera" autoplay playsinline></video>
    
    <div id="hud-layer"><div id="radar-line"></div><div id="reticle-outer"></div><div id="reticle"></div></div>
    
    <!-- Proximity Radar -->
    <div id="proximity-radar">
        <div id="radar-sweep"></div>
        <div id="radar-blip"></div>
    </div>

    <div id="overlay"></div>
    <div id="ui-layer">
        <div class="top-bar">
            <div class="info-panel">
                <span id="agent-name-display">AGENT: ???</span>
                <span id="agent-rank-display">RANK: TRAINEE<br>CAUGHT: 0 | BOUNTIES: 0</span>
            </div>
            <div class="btn-group">
                <button id="mission-btn" class="btn-small btn-small-yellow">MISSIONS</button>
                <button id="vision-btn" class="btn-small">VISION</button>
                <button id="gallery-btn" class="btn-small">INTEL CODEX</button>
            </div>
        </div>
        <div id="status-text">SYSTEM ONLINE</div>
        <button id="scan-btn">SCAN TARGET</button>
    </div>
</div>

<div id="proof-screen" class="modal-screen">
    <div class="scanlines"></div>
    <div style="color:#f00; font-size: 1.5rem; font-weight:bold; margin-bottom:10px;">INFILTRATOR CAUGHT</div>
    <img id="proof-image" src="" alt="Proof Photo">
    <button id="dismiss-btn" class="red-btn">SAVE TO CODEX & RESUME</button>
</div>

<div id="gallery-screen" class="modal-screen">
    <div class="scanlines"></div>
    <h2 style="margin-top:0; color:#fff;">SPECIES CODEX</h2>
    <div id="gallery-grid"></div>
    <button id="close-gallery-btn" class="green-btn">RETURN TO SCANNER</button>
    <button id="logout-btn" class="red-btn" style="margin-top:10px; padding:10px; font-size:1rem;">SWITCH AGENT</button>
</div>

<canvas id="canvas-processor" style="display:none;"></canvas>

<script>
    const video = document.getElementById('camera');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');
    const scanBtn = document.getElementById('scan-btn');
    const radarLine = document.getElementById('radar-line');
    
    // UI Elements
    const profileScreen = document.getElementById('profile-screen');
    const agentInput = document.getElementById('agent-input');
    const loginBtn = document.getElementById('login-btn');
    const briefingScreen = document.getElementById('briefing-screen');
    const briefingText = document.getElementById('briefing-text');
    const acceptBtn = document.getElementById('accept-btn');
    const videoContainer = document.getElementById('video-container');
    const proofScreen = document.getElementById('proof-screen');
    const proofImage = document.getElementById('proof-image');
    const dismissBtn = document.getElementById('dismiss-btn');
    const galleryScreen = document.getElementById('gallery-screen');
    const galleryBtn = document.getElementById('gallery-btn');
    const closeGalleryBtn = document.getElementById('close-gallery-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const galleryGrid = document.getElementById('gallery-grid');
    const visionBtn = document.getElementById('vision-btn');
    const missionBtn = document.getElementById('mission-btn');
    const missionBoardScreen = document.getElementById('mission-board-screen');
    const closeMissionBtn = document.getElementById('close-mission-btn');
    const bountyTargetName = document.getElementById('bounty-target-name');
    const agentNameDisplay = document.getElementById('agent-name-display');
    const agentRankDisplay = document.getElementById('agent-rank-display');
    
    const radarBlip = document.getElementById('radar-blip');
    const canvas = document.getElementById('canvas-processor');
    const ctx = canvas.getContext('2d');

    // --- MASSIVELY EXPANDED DATA ARRAYS ---
    const data_species = ["Gigglotentacloid", "Nebula Snail", "Purple Gloop-Dropper", "Standard Gray", "Fuzzy Sock Snatcher", "Laser-Eyed Noodle", "Tentacled Tootsie-Pop", "Chromium Couch-Potato", "Galactic Dust-Bunny", "Holographic Hamster", "Void-Whale", "Zorpian Glider", "Quantum Quack", "Meteorite Muncher", "Sirius Slimeball", "Plutonian Polka-Dot", "Plasma Penguin", "Neon Nodule", "Cosmic Cabbage", "Warp-Speed Wombat"];
    const data_planets = ["Planet Broccoli", "Big Cheese Cluster", "Noodle Nebula Sector 4", "Broccoli Beta-9", "Sector X", "Void of Homework", "Glitter Galaxy", "Planet Marshmallow", "Rusty Orbit 5", "Dark Side of the Moon", "Alpha Centauri Prime", "The Jellybean Belt", "Sofa-Cushion System", "Nebula No-Bedtime"];
    const data_threats = ["MAXIMUM (Steals dessert)", "VERY LOW (Just wants a hug)", "HIGH (Dislikes loud noises)", "UNKNOWN (Approach with glitter)", "MEDIUM (Steals TV remotes)", "VARIABLE (Napping)", "EXTREME (Will eat your homework)", "LOW (Mostly harmless)", "CRITICAL (Tickles without warning)"];
    const data_habits = ["Mimicking bird calls", "Counting bubbles in drinks", "Stealing left shoes", "Leaving slime trails", "Hiding TV remotes", "Eating red crayons", "Polishing spoons", "Humming elevator music", "Rearranging books by smell", "Trying to talk to the dog", "Sleeping in the laundry basket"];
    const data_toxic = ["NO", "YES (Smells like old socks)", "ONLY IF BOILED", "EXTREMELY (Spits glitter)", "MILDLY (Sticky fingers)", "HIGHLY (Causes hiccups)", "UNKNOWN (Do not lick)", "NO (Tastes like chicken)"];

    let audioCtx;
    let forceAlien = false;
    let holdTimer;
    let currentAgent = "";
    let intelDatabase = [];
    let agentBounties = 0;
    let currentBounty = "";
    let visionMode = 0;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'alien') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'camera') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(2000, audioCtx.currentTime); osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'beep') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        } else if (type === 'bounty') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'ping') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime); // High C ping
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
    }

    function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }

    // --- MOTION TRACKER LOGIC ---
    setInterval(() => {
        // Only ping if scanner is active and idle, 25% chance every 2 seconds
        if (videoContainer.style.display === 'block' && scanBtn.disabled === false && Math.random() < 0.25) {
            initAudio(); playSound('ping');
            radarBlip.style.top = Math.random() * 50 + 10 + 'px'; // Random position in radar
            radarBlip.style.left = Math.random() * 50 + 10 + 'px';
            radarBlip.style.opacity = '1';
            setTimeout(() => radarBlip.style.opacity = '0', 800);
        }
    }, 2000);

    function getRank(count) {
        if (count < 3) return "TRAINEE";
        if (count < 10) return "FIELD AGENT";
        if (count < 25) return "SENIOR AGENT";
        return "ELITE HUNTER";
    }

    function updateAgentDisplay() {
        agentNameDisplay.innerText = `AGENT: ${currentAgent}`;
        agentRankDisplay.innerHTML = `RANK: ${getRank(intelDatabase.length)}<br>CAUGHT: ${intelDatabase.length} | BOUNTIES: ${agentBounties}`;
    }

    function assignNewBounty() {
        currentBounty = data_species[Math.floor(Math.random() * data_species.length)];
        localStorage.setItem(`bountyTarget_${currentAgent}`, currentBounty);
        bountyTargetName.innerText = currentBounty;
    }

    loginBtn.addEventListener('click', () => {
        initAudio();
        const name = agentInput.value.trim().toUpperCase();
        if (name === "") return;
        
        currentAgent = name;
        const savedData = localStorage.getItem(`alienIntel_${currentAgent}`);
        intelDatabase = savedData ? JSON.parse(savedData) : [];
        const savedBounties = localStorage.getItem(`alienBounties_${currentAgent}`);
        agentBounties = savedBounties ? parseInt(savedBounties) : 0;
        const savedTarget = localStorage.getItem(`bountyTarget_${currentAgent}`);
        if (savedTarget) {
            currentBounty = savedTarget; bountyTargetName.innerText = currentBounty;
        } else assignNewBounty();
        
        updateAgentDisplay();
        playSound('beep');
        profileScreen.style.display = 'none';
        briefingScreen.style.display = 'flex';
        typeWriter();
    });

    logoutBtn.addEventListener('click', () => {
        galleryScreen.style.display = 'none';
        videoContainer.style.display = 'none';
        agentInput.value = "";
        profileScreen.style.display = 'flex';
    });

    missionBtn.addEventListener('click', () => { playSound('beep'); missionBoardScreen.style.display = 'flex'; });
    closeMissionBtn.addEventListener('click', () => { playSound('beep'); missionBoardScreen.style.display = 'none'; });

    visionBtn.addEventListener('click', () => {
        visionMode = (visionMode + 1) % 3; video.className = ''; 
        if (visionMode === 1) { video.classList.add('filter-night'); statusText.innerText = "NIGHT VISION"; } 
        else if (visionMode === 2) { video.classList.add('filter-thermal'); statusText.innerText = "THERMAL IMAGING"; } 
        else { statusText.innerText = "SYSTEM ONLINE"; }
        playSound('beep');
    });

    const missionText = "CLASSIFIED BRIEFING...\n\nEarth has been infiltrated.\n\nAliens are walking among us, disguised as normal humans. Your mission is to use this Biometric Scanner to expose them and build an Intel Database.\n\nCheck the BOUNTY BOARD for Priority Targets. Pay attention to the Proximity Tracker.\n\nGood luck.";
    let typeIndex = 0;
    
    function typeWriter() {
        if (typeIndex < missionText.length) {
            briefingText.innerHTML += missionText.charAt(typeIndex) === '\n' ? '<br>' : missionText.charAt(typeIndex);
            typeIndex++;
            if(typeIndex % 3 === 0) playSound('beep'); 
            setTimeout(typeWriter, 40);
        } else acceptBtn.style.display = 'block';
    }

    acceptBtn.addEventListener('click', () => {
        playSound('beep');
        briefingScreen.style.display = 'none';
        videoContainer.style.display = 'block';
        setupCamera();
    });

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
            video.srcObject = stream;
        } catch (err) {
            statusText.innerText = "CAMERA ERROR"; statusText.classList.add('alien-active');
        }
    }

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' '); let line = '';
        for(let n = 0; n < words.length; n++) {
            const testLine = line + words[n] + ' '; const metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                context.strokeText(line, x, y); context.fillText(line, x, y);
                line = words[n] + ' '; y += lineHeight;
            } else line = testLine;
        }
        context.strokeText(line, x, y); context.fillText(line, x, y); return y + lineHeight; 
    }

    function generateEvidenceReport() {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        
        if(visionMode === 1) ctx.filter = 'sepia(100%) hue-rotate(90deg) saturate(300%) contrast(150%)';
        if(visionMode === 2) ctx.filter = 'invert(1) hue-rotate(180deg) saturate(200%) contrast(120%)';
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.filter = 'none'; 

        const w = canvas.width; const h = canvas.height;
        const margin = Math.floor(w * 0.05); const lineHeight = Math.floor(h * 0.04); 
        
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; ctx.strokeStyle = "black";
        ctx.lineWidth = Math.floor(w * 0.005); ctx.font = `bold ${Math.floor(h * 0.035)}px Courier New`; 
        ctx.textBaseline = "top";

        const maxTextWidth = w - (margin * 2);
        ctx.fillStyle = "rgba(0,0,0,0.65)"; 
        ctx.fillRect(margin - 10, h * 0.48, w - (margin * 2) + 20, h * 0.52); // Taller box for toxicity

        let currentY = h * 0.50;

        const printLine = (label, value, color="#fff") => {
            ctx.fillStyle = "#ff0"; 
            ctx.strokeText(`${label}:`, margin, currentY); ctx.fillText(`${label}:`, margin, currentY);
            const labelWidth = ctx.measureText(`${label}: `).width;
            ctx.fillStyle = color; 
            currentY = wrapText(ctx, value, margin + labelWidth, currentY, maxTextWidth - labelWidth, lineHeight);
            currentY += (lineHeight * 0.3); 
        };

        let generatedSpecies = data_species[Math.floor(Math.random() * data_species.length)];
        if (Math.random() < 0.40) generatedSpecies = currentBounty; // 40% bounty chance
        const isBountyCaught = (generatedSpecies === currentBounty);

        ctx.fillStyle = "#f00"; ctx.font = `bold ${Math.floor(h * 0.05)}px Courier New`;
        ctx.fillText(`ALIEN CONFIRMED`, margin, margin * 2);

        if (isBountyCaught) {
            ctx.fillStyle = "#0f0"; ctx.font = `bold ${Math.floor(h * 0.045)}px Courier New`;
            ctx.fillText(`★ BOUNTY CLAIMED ★`, margin, margin * 2 + (h * 0.06));
            setTimeout(() => playSound('bounty'), 1500); // Play bounty sound after main alarm
            agentBounties++; localStorage.setItem(`alienBounties_${currentAgent}`, agentBounties);
            assignNewBounty(); updateAgentDisplay();
        }

        ctx.font = `bold ${Math.floor(h * 0.035)}px Courier New`;
        printLine("SPECIES", generatedSpecies);
        printLine("ORIGIN", data_planets[Math.floor(Math.random() * data_planets.length)]);
        let threat = data_threats[Math.floor(Math.random() * data_threats.length)];
        printLine("THREAT", threat, threat.includes("MAXIMUM") || threat.includes("EXTREME") ? "#f00" : "#fff");
        let toxic = data_toxic[Math.floor(Math.random() * data_toxic.length)];
        printLine("TOXIC", toxic, toxic.includes("EXTREMELY") || toxic.includes("HIGHLY") ? "#f00" : "#fff");
        printLine("HABIT", data_habits[Math.floor(Math.random() * data_habits.length)]);

        // Save data url for when the alarms are finished
        proofImage.dataset.tempImageData = canvas.toDataURL('image/jpeg', 0.8);
    }

    function startHoldTimer() { holdTimer = setTimeout(() => { forceAlien = true; scanBtn.style.borderColor = "#f00"; setTimeout(() => { scanBtn.style.borderColor = "#0f0"; }, 300); vibrate(50); }, 2000); }
    function cancelHoldTimer() { clearTimeout(holdTimer); }

    scanBtn.addEventListener('mousedown', startHoldTimer); scanBtn.addEventListener('touchstart', startHoldTimer, {passive: true});
    scanBtn.addEventListener('mouseup', cancelHoldTimer); scanBtn.addEventListener('mouseleave', cancelHoldTimer); scanBtn.addEventListener('touchend', cancelHoldTimer);

    scanBtn.addEventListener('click', () => {
        initAudio(); scanBtn.disabled = true; statusText.innerText = "SCANNING..."; statusText.classList.remove('alien-active');
        radarLine.style.opacity = "1"; radarLine.style.animation = "scanMove 1.5s ease-in-out infinite";
        
        let blipCount = 0;
        let scanInterval = setInterval(() => { playSound('beep'); vibrate(20); blipCount++; if(blipCount >= 6) clearInterval(scanInterval); }, 300);

        setTimeout(() => {
            radarLine.style.opacity = "0"; radarLine.style.animation = "none";
            const isAlien = forceAlien || (Math.random() < 0.15); forceAlien = false; 

            if (isAlien) {
                // INSTANT SNAP: Generate the photo immediately before the subject moves
                playSound('camera');
                generateEvidenceReport();

                // TRIGGER ALARMS AFTER PHOTO IS SAVED IN MEMORY
                statusText.innerText = "⚠️ ALIEN DETECTED ⚠️"; statusText.classList.add('alien-active');
                vibrate([200, 100, 200, 100, 400]); 
                
                let strobe = setInterval(() => { overlay.style.backgroundColor = overlay.style.backgroundColor === "rgba(255, 0, 0, 0.7)" ? "rgba(0, 0, 0, 0)" : "rgba(255, 0, 0, 0.7)"; }, 100);
                setTimeout(() => clearInterval(strobe), 1500);

                let sirenCount = 0; playSound('alien');
                let sirenInterval = setInterval(() => { playSound('alien'); sirenCount++; if(sirenCount >= 2) clearInterval(sirenInterval); }, 400);

                // SHOW THE SAVED PHOTO AFTER ALARMS FINISH
                setTimeout(() => { 
                    proofImage.src = proofImage.dataset.tempImageData;
                    proofScreen.style.display = 'flex'; 
                }, 1700);
            } else {
                statusText.innerText = "SUBJECT: 100% HUMAN"; overlay.style.backgroundColor = "rgba(0, 255, 0, 0.25)"; vibrate([100, 50, 100]);
                setTimeout(() => { 
                    statusText.innerText = visionMode === 1 ? "NIGHT VISION" : visionMode === 2 ? "THERMAL IMAGING" : "SYSTEM ONLINE"; 
                    overlay.style.backgroundColor = "rgba(0, 0, 0, 0)"; scanBtn.disabled = false; 
                }, 2500);
            }
        }, 2200); 
    });

    dismissBtn.addEventListener('click', () => {
        intelDatabase.unshift(proofImage.dataset.tempImageData); 
        localStorage.setItem(`alienIntel_${currentAgent}`, JSON.stringify(intelDatabase));
        updateAgentDisplay();
        
        proofScreen.style.display = 'none';
        statusText.innerText = visionMode === 1 ? "NIGHT VISION" : visionMode === 2 ? "THERMAL IMAGING" : "SYSTEM ONLINE";
        statusText.classList.remove('alien-active');
        overlay.style.backgroundColor = "rgba(0, 0, 0, 0)"; scanBtn.disabled = false;
    });

    galleryBtn.addEventListener('click', () => {
        galleryGrid.innerHTML = ''; 
        if(intelDatabase.length === 0) {
            galleryGrid.innerHTML = '<p style="color:#fff;">No aliens detected yet.</p>';
        } else {
            intelDatabase.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc; img.className = 'gallery-item';
                galleryGrid.appendChild(img);
            });
        }
        galleryScreen.style.display = 'flex';
    });

    closeGalleryBtn.addEventListener('click', () => { galleryScreen.style.display = 'none'; });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }
</script>
</body>
</html>
